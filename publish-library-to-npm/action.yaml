name: Publish NPM
description: >
  OIDC npm publish for @qvac/* packages with AUTO_DECIDE dist-tag routing.
  Backward compatible: callers can omit tag and backport routing is handled automatically.
  Callers MUST gate on release-* refs before invoking this action; the action also enforces
  this internally as defense-in-depth.

inputs:
  tag:
    description: >
      npm dist-tag. Empty (default) or "latest" on a release-* branch triggers AUTO_DECIDE.
      Any other explicit value (e.g. "next", "release-1.x") is used verbatim — no AUTO_DECIDE.
    required: false
    default: "latest"
  workdir:
    description: "Directory containing package.json."
    required: true

outputs:
  npm_published_version:
    description: "Version published to npm."
    value: ${{ steps.publish.outputs.npm_published_version }}

runs:
  using: composite
  steps:
    - name: Assert release branch
      shell: bash
      env:
        GHA_REF: ${{ github.ref }}
      run: |
        set -euo pipefail
        if [[ "${GHA_REF}" != refs/heads/release-* ]]; then
          echo "::error::publish-library-to-npm must only be invoked from a release-* branch (got: ${GHA_REF}). Callers must gate on release-* refs."
          exit 1
        fi

    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
      with:
        node-version: "24.14.1" # installs npm version 11.11.0
        registry-url: https://registry.npmjs.org/
        scope: "@qvac"

    - name: Read package info
      id: pkg
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
        echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Decide dist-tag (AUTO_DECIDE)
      id: tag-decision
      shell: bash
      env:
        INPUT_TAG:       ${{ inputs.tag }}
        PACKAGE_NAME:    ${{ steps.pkg.outputs.name }}
        PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
      run: |
        set -euo pipefail

        # Explicit tag (not empty, not "latest") → use verbatim
        if [ -n "${INPUT_TAG}" ] && [ "${INPUT_TAG}" != "latest" ]; then
          echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # AUTO_DECIDE: compare version vs registry latest
        MAJOR_MINOR=$(echo "${PACKAGE_VERSION}" | awk -F. '{print $1"."$2}')

        # Pre-release versions (x.y.z-foo) always route to a versioned tag, never latest
        if echo "${PACKAGE_VERSION}" | grep -q '-'; then
          echo "tag=release-${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Distinguish E404 (first publish) from transient registry errors (5xx, network, rate-limit).
        # Only treat E404 as "not yet published" → fall back to 0.0.0; all other errors must fail.
        set +e
        NPM_OUT=$(npm view "${PACKAGE_NAME}" dist-tags.latest 2>&1)
        NPM_RC=$?
        set -e

        if [ "${NPM_RC}" -ne 0 ]; then
          if echo "${NPM_OUT}" | grep -q 'E404'; then
            echo "npm view returned E404 for ${PACKAGE_NAME} -> treating as first publish (current latest = 0.0.0)"
            CURRENT_LATEST="0.0.0"
          else
            echo "::error title=npm view failed::Could not query dist-tags.latest for ${PACKAGE_NAME} (exit ${NPM_RC}). Auto-decide refuses to assume 'latest' on registry errors. Re-run after the registry recovers, or pass an explicit tag." >&2
            echo "${NPM_OUT}" >&2
            exit 1
          fi
        else
          CURRENT_LATEST="${NPM_OUT:-0.0.0}"
        fi

        HIGHER=$(node -e '
          const core = v => v.replace(/^v/, "").split("-")[0].split(".").map(Number);
          const [a,b,c] = core(process.argv[1]);
          const [x,y,z] = core(process.argv[2]);
          console.log((a-x || b-y || c-z) >= 0 ? "yes" : "no");
        ' "${PACKAGE_VERSION}" "${CURRENT_LATEST}")

        if [ "${HIGHER}" = "yes" ]; then
          echo "tag=latest" >> "$GITHUB_OUTPUT"
        else
          echo "tag=release-${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish to npm
      id: publish
      shell: bash
      working-directory: ${{ inputs.workdir }}
      env:
        RESOLVED_TAG: ${{ steps.tag-decision.outputs.tag }}
        PUBLISHED_VERSION: ${{ steps.pkg.outputs.version }}
      run: |
        set -euo pipefail
        npm publish --tag "${RESOLVED_TAG}" --access public --provenance
        echo "npm_published_version=${PUBLISHED_VERSION}" >> "$GITHUB_OUTPUT"
