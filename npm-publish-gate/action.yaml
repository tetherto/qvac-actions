name: npm Publish Gate
description: >
  Single-responsibility gate: decides whether npm publishing should proceed.
  Outputs should_publish=false for graceful-skip cases (dev/tmp tags or
  non-release branches). Hard-fails only on unexpected branch violations.
  Keeps dist-tag-determination and publish-library-to-npm assertion-free.

inputs:
  tag:
    description: "Resolved npm dist-tag (from dist-tag-determination)."
    required: true

outputs:
  should_publish:
    description: "'true' when all conditions are met for npm publish, 'false' to skip gracefully."
    value: ${{ steps.gate.outputs.should_publish }}

runs:
  using: composite
  steps:
    - name: Evaluate publish gate
      id: gate
      shell: bash
      env:
        RESOLVED_TAG: ${{ inputs.tag }}
        GHA_REF: ${{ github.ref }}
      run: |
        set -euo pipefail

        # Non-production tags → graceful skip (no error).
        if [ "${RESOLVED_TAG}" = "dev" ] || [ "${RESOLVED_TAG}" = "tmp" ]; then
          echo "Skipping npm publish: non-production tag '${RESOLVED_TAG}'"
          echo "should_publish=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # OIDC npm publish requires a release-* branch.
        if [[ "${GHA_REF}" != refs/heads/release-* ]]; then
          echo "::error title=npm-publish-gate::Expected a release-* branch, got '${GHA_REF}'. Callers must gate on release-* refs before calling this action."
          exit 1
        fi

        echo "should_publish=true" >> "$GITHUB_OUTPUT"
