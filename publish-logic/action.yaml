name: Publish logic
description: "Resolve branch type, gpr_tag, and npm_tag for package publish jobs."

inputs:
  npm_tag:
    description: "Operator npm dist-tag override (workflow_dispatch). Empty => latest."
    required: false
    default: ""

outputs:
  publish_main:
    description: "true when on main (push/workflow_dispatch)."
    value: ${{ steps.logic.outputs.publish_main }}
  publish_release:
    description: "true when on a release-* branch."
    value: ${{ steps.logic.outputs.publish_release }}
  publish_feature:
    description: "true when on a feature-* branch."
    value: ${{ steps.logic.outputs.publish_feature }}
  publish_tmp:
    description: "true when on a tmp-* branch."
    value: ${{ steps.logic.outputs.publish_tmp }}
  gpr_tag:
    description: "GitHub Packages dist-tag (dev/feature/temp)."
    value: ${{ steps.logic.outputs.gpr_tag }}
  npm_tag:
    description: "npm dist-tag: operator override or latest."
    value: ${{ steps.logic.outputs.npm_tag }}

runs:
  using: composite
  steps:
    - id: logic
      shell: bash
      env:
        NPM_TAG_INPUT: ${{ inputs.npm_tag }}
      run: |
        set -euo pipefail
        ref_name="${GITHUB_REF_NAME}"
        event_name="${GITHUB_EVENT_NAME}"

        publish_main=false
        publish_release=false
        publish_feature=false
        publish_tmp=false
        if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
          if   [ "$ref_name" = "main" ];       then publish_main=true
          elif [[ "$ref_name" == release-* ]]; then publish_release=true
          elif [[ "$ref_name" == feature-* ]]; then publish_feature=true
          elif [[ "$ref_name" == tmp-* ]];     then publish_tmp=true
          fi
        fi

        gpr_tag="dev"
        if   [[ "$ref_name" == feature-* ]]; then gpr_tag="feature"
        elif [[ "$ref_name" == tmp-* ]];     then gpr_tag="temp"
        fi

        npm_tag="${NPM_TAG_INPUT:-}"
        [ -n "$npm_tag" ] || npm_tag="latest"

        {
          echo "publish_main=$publish_main"
          echo "publish_release=$publish_release"
          echo "publish_feature=$publish_feature"
          echo "publish_tmp=$publish_tmp"
          echo "gpr_tag=$gpr_tag"
          echo "npm_tag=$npm_tag"
        } >> "$GITHUB_OUTPUT"
