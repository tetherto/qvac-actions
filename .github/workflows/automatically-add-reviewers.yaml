name: Notify External Reviewers via Comment

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  notify-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Comment to notify potential reviewers
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const externalReviewers = ['chetasr', 'yuranch', 'vigan-abd', 'natachikhinashvili', 'u011', 'olyasir', 'ignaciolarranaga'];

            const commentBody = `Requesting review from: ${externalReviewers.map(user => `@${user}`).join(', ')}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

            console.log('Notified external reviewers via PR comment.');
