name: Notify External Reviewers via Comment

on:
  workflow_call:
    inputs:
      reviewers:
        description: 'List of reviewers to notify'
        required: true
        type: string
        default: 'natachikhinashvili,u011,haakari'

jobs:
  notify-reviewers:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check for existing comment
        id: check-comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const reviewers = '${{ inputs.reviewers }}'.split(',');
            const expectedCommentText = `Requesting review from: ${reviewers.map(user => `@${user}`).join(', ')} [auto_pr_review_request]`;
            
            const botComment = comments.data.find(comment => 
              comment.user.login === 'github-actions[bot]' && 
              comment.body.includes('[auto_pr_review_request]')
            );
            
            return botComment ? true : false;

      - name: Comment to notify potential reviewers
        if: steps.check-comment.outputs.result == false
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reviewers = '${{ inputs.reviewers }}'.split(',');
            const commentBody = `Requesting review from: ${reviewers.map(user => `@${user}`).join(', ')} [auto_pr_review_request]`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
