name: Canonical Security Baseline
# Reusable workflow: TruffleHog secret scanning + CodeQL static analysis.
# Consumed by Tier-1 repos via `uses:`. See docs/security-baseline.md.

on:
  workflow_call:
    inputs:
      languages:
        description: "Comma-separated CodeQL languages override (e.g. javascript-typescript,python). Empty = file-based autodetect. IMPORTANT: in mixed repos containing C/C++, set this explicitly (e.g. 'c-cpp,javascript-typescript') — autodetect frequently misses C/C++ and the scan will silently skip it."
        required: false
        type: string
        default: ""
      severity-threshold:
        description: "Lowest CodeQL severity that fails the job (low|medium|high|critical)."
        required: false
        type: string
        default: "high"
      paths-include:
        description: "Newline-separated path globs to include (applied to TruffleHog --include-paths and CodeQL paths:)."
        required: false
        type: string
        default: ""
      paths-exclude:
        description: "Newline-separated path globs to exclude (applied to TruffleHog --exclude-paths and CodeQL paths-ignore:)."
        required: false
        type: string
        default: ""
      allowlist-path:
        description: "Path within the consumer repo to a TruffleHog allowlist YAML (known false positives)."
        required: false
        type: string
        default: ""
      trufflehog-fail-on-unverified:
        description: "Fail the job on unverified TruffleHog matches. Default false: only verified secrets fail."
        required: false
        type: boolean
        default: false
      codeql-queries:
        description: "CodeQL query packs (comma-separated)."
        required: false
        type: string
        default: "security-extended,security-and-quality"
      codeql-category-prefix:
        description: "Optional prefix added to the CodeQL SARIF category. Use this to coexist with another advanced CodeQL workflow on the same repo (each workflow needs a distinct category, otherwise SARIF upload collides). Empty default produces the standard '/language:<lang>' category."
        required: false
        type: string
        default: ""
      codeql-upload:
        description: "Whether to upload CodeQL SARIF to the Security tab. One of 'always', 'failure-only', 'never'. Set to 'never' when the repo has GitHub's 'Default setup' for code scanning enabled — default setup rejects SARIF from advanced workflows. Severity gating still works because SARIF is always written locally for the gate to read."
        required: false
        type: string
        default: "always"
      enable-pr-comment:
        description: "Post a summary comment on PRs when findings exist. Job summary is always written."
        required: false
        type: boolean
        default: true
      codeql-build-mode:
        description: "CodeQL build mode. Only two values are supported: empty default (keeps the legacy Autobuild step, i.e. current behavior) or 'none' for buildless extraction (no compilation or submodule checkout). 'none' is valid for every CodeQL language and is the fix for C/C++ repos whose autobuild fails (e.g. submodule-based CMake projects). 'autobuild'/'manual' are intentionally NOT accepted: they error on interpreted-language matrix jobs, and 'manual' has no build hook in this workflow. The workflow validates this input and fails fast on any other value."
        required: false
        type: string
        default: ""
    secrets:
      gh_token:
        description: "Optional token override for SARIF upload + PR comments. Defaults to github.token."
        required: false

# These are the permissions the *caller* job must grant for the reusable
# workflow to function. Documented here for reference; the GitHub runtime
# enforces them against the caller's `permissions:` block.
permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # On pull_request / pull_request_target the default ref is the base
          # branch; scan the PR HEAD instead so the tree matches the range
          # computed below (otherwise pull_request_target scans base, not the
          # proposed changes). Falls back to github.sha for push/other events.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.gh_token || github.token }}

      - name: Compute TruffleHog scan range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request|pull_request_target)
              echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            push)
              before="${{ github.event.before }}"
              if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]]; then
                before=""
              fi
              echo "base=$before" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "base=" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Materialize path filters
        id: filters
        shell: bash
        env:
          PATHS_INCLUDE: ${{ inputs.paths-include }}
          PATHS_EXCLUDE: ${{ inputs.paths-exclude }}
        run: |
          set -euo pipefail
          if [[ -n "$PATHS_INCLUDE" ]]; then
            tmp_inc="$(mktemp)"
            printf '%s\n' "$PATHS_INCLUDE" > "$tmp_inc"
            echo "include-file=$tmp_inc" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "$PATHS_EXCLUDE" ]]; then
            tmp_exc="$(mktemp)"
            printf '%s\n' "$PATHS_EXCLUDE" > "$tmp_exc"
            echo "exclude-file=$tmp_exc" >> "$GITHUB_OUTPUT"
          fi

      - name: Run TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          path: .
          base: ${{ steps.range.outputs.base }}
          head: ${{ steps.range.outputs.head }}
          # The TruffleHog action passes `--fail` to the underlying CLI automatically,
          # so do NOT include it here (duplicate flag => "flag 'fail' cannot be repeated").
          # `--only-verified` is what restricts what triggers that fail.
          extra_args: >-
            ${{ inputs.trufflehog-fail-on-unverified && '' || '--only-verified' }}
            ${{ steps.filters.outputs.include-file && format('--include-paths={0}', steps.filters.outputs.include-file) || '' }}
            ${{ steps.filters.outputs.exclude-file && format('--exclude-paths={0}', steps.filters.outputs.exclude-file) || '' }}
            ${{ inputs.allowlist-path && format('--config={0}', inputs.allowlist-path) || '' }}

  detect-languages:
    name: Detect CodeQL languages
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.set.outputs.languages }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Detect languages from the PR HEAD tree, consistent with the
          # trufflehog and codeql jobs.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Determine language matrix
        id: set
        shell: bash
        env:
          LANGUAGES: ${{ inputs.languages }}
        run: |
          set -euo pipefail
          if [[ -n "$LANGUAGES" ]]; then
            raw="$LANGUAGES"
          else
            shopt -s nullglob globstar
            detected=()
            files=( **/*.js **/*.jsx **/*.ts **/*.tsx ); (( ${#files[@]} > 0 )) && detected+=("javascript-typescript")
            files=( **/*.py );                          (( ${#files[@]} > 0 )) && detected+=("python")
            files=( **/*.go );                          (( ${#files[@]} > 0 )) && detected+=("go")
            files=( **/*.java **/*.kt );                (( ${#files[@]} > 0 )) && detected+=("java-kotlin")
            files=( **/*.rb );                          (( ${#files[@]} > 0 )) && detected+=("ruby")
            files=( **/*.cs );                          (( ${#files[@]} > 0 )) && detected+=("csharp")
            files=( **/*.swift );                       (( ${#files[@]} > 0 )) && detected+=("swift")
            files=( **/*.c **/*.cc **/*.cpp **/*.h **/*.hpp ); (( ${#files[@]} > 0 )) && detected+=("c-cpp")
            if [[ ${#detected[@]} -eq 0 ]]; then
              detected=("javascript-typescript")
            fi
            raw=$(IFS=,; echo "${detected[*]}")
          fi
          echo "Detected/overridden languages: $raw"
          json=$(printf '%s\n' "$raw" | jq -R -c 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          echo "languages=$json" >> "$GITHUB_OUTPUT"

  codeql:
    name: CodeQL (${{ matrix.language }})
    needs: detect-languages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect-languages.outputs.languages) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Match the trufflehog job: analyze PR HEAD, not the base branch,
          # on pull_request / pull_request_target.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Build CodeQL config file
        id: cfg
        shell: bash
        env:
          PATHS_INCLUDE: ${{ inputs.paths-include }}
          PATHS_EXCLUDE: ${{ inputs.paths-exclude }}
        run: |
          set -euo pipefail
          # CodeQL's init action rejects config-file paths outside $GITHUB_WORKSPACE,
          # so the temp file must live under the workspace, not /tmp.
          cfg="${GITHUB_WORKSPACE}/.codeql-baseline-config.yml"
          {
            echo "name: security-baseline"
            if [[ -n "$PATHS_INCLUDE" ]]; then
              echo "paths:"
              while IFS= read -r p; do
                [[ -z "$p" ]] && continue
                echo "  - $p"
              done <<< "$PATHS_INCLUDE"
            fi
            if [[ -n "$PATHS_EXCLUDE" ]]; then
              echo "paths-ignore:"
              while IFS= read -r p; do
                [[ -z "$p" ]] && continue
                echo "  - $p"
              done <<< "$PATHS_EXCLUDE"
            fi
          } > "$cfg"
          echo "path=$cfg" >> "$GITHUB_OUTPUT"
          echo "----- generated CodeQL config -----"
          cat "$cfg"

      - name: Validate build-mode
        shell: bash
        env:
          BUILD_MODE: ${{ inputs.codeql-build-mode }}
        run: |
          set -euo pipefail
          # Only '' (legacy autobuild) and 'none' (buildless) are valid here.
          # 'none' works for every language; 'autobuild'/'manual' would error on
          # interpreted-language matrix jobs and 'manual' has no build hook in
          # this workflow, so reject anything else loudly instead of surfacing a
          # confusing CodeQL init error later.
          case "$BUILD_MODE" in
            "" | none) : ;;
            *)
              echo "::error::codeql-build-mode must be '' (default: legacy autobuild) or 'none' (buildless). Got: '$BUILD_MODE'."
              exit 1
              ;;
          esac

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.codeql-queries }}
          config-file: ${{ steps.cfg.outputs.path }}
          # Empty default leaves build-mode unset, preserving the legacy
          # Autobuild step below. 'none' selects buildless extraction (no
          # compilation or submodule checkout required) and is valid for every
          # language. Only '' and 'none' are accepted (validated above).
          build-mode: ${{ inputs.codeql-build-mode }}

      - name: Autobuild
        # Skipped when a build-mode is explicitly requested: 'none' needs no
        # build, and 'autobuild'/'manual' are handled by the init action itself.
        if: inputs.codeql-build-mode == ''
        uses: github/codeql-action/autobuild@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3

      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          category: ${{ inputs.codeql-category-prefix && format('/{0}/language:{1}', inputs.codeql-category-prefix, matrix.language) || format('/language:{0}', matrix.language) }}
          upload: ${{ inputs.codeql-upload }}
          output: codeql-sarif

      - name: Enforce severity threshold
        shell: bash
        env:
          THRESHOLD: ${{ inputs.severity-threshold }}
          LANGUAGE: ${{ matrix.language }}
        run: |
          set -euo pipefail
          # SARIF level mapping (per CodeQL's standard security-severity buckets):
          #   critical / high -> error
          #   medium          -> warning
          #   low             -> note
          case "$(echo "$THRESHOLD" | tr '[:upper:]' '[:lower:]')" in
            critical|high) gate_levels='["error"]' ;;
            medium)        gate_levels='["error","warning"]' ;;
            low)           gate_levels='["error","warning","note"]' ;;
            *) echo "::error::Unknown severity-threshold: $THRESHOLD (expected one of low|medium|high|critical)"; exit 1 ;;
          esac
          shopt -s nullglob
          count=0
          for sarif in codeql-sarif/*.sarif; do
            # CodeQL carries severity on rule.defaultConfiguration.level, not on
            # the individual result. Resolve the effective level as
            #   result.level OR rule.defaultConfiguration.level OR "warning"
            # otherwise real error-level findings are bucketed as "warning" and
            # slip past a high/critical threshold (the gate would never block).
            c=$(jq --argjson lvls "$gate_levels" '
              [ .runs[]? as $run
                | ( $run.tool.driver.rules // [] | INDEX(.id) ) as $rules
                | $run.results[]?
                | select((.level // $rules[.ruleId].defaultConfiguration.level // "warning") | IN($lvls[]))
              ] | length
            ' "$sarif") || {
              echo "::error::Failed to evaluate SARIF $sarif"
              exit 1
            }
            count=$((count + c))
          done
          if (( count > 0 )); then
            echo "::error title=CodeQL findings at or above ${THRESHOLD}::Found ${count} blocking result(s) for ${LANGUAGE}"
            exit 1
          fi
          echo "No CodeQL findings at or above severity '${THRESHOLD}' for ${LANGUAGE}."

  summary:
    name: Security baseline summary
    needs: [trufflehog, codeql]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Write job summary
        shell: bash
        env:
          TH_RESULT: ${{ needs.trufflehog.result }}
          CQ_RESULT: ${{ needs.codeql.result }}
          LANG_INPUT: ${{ inputs.languages }}
          THRESHOLD: ${{ inputs.severity-threshold }}
        run: |
          set -euo pipefail
          lang_label="autodetected"
          if [[ -n "$LANG_INPUT" ]]; then
            lang_label="$LANG_INPUT"
          fi
          {
            echo "## Security baseline"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| TruffleHog (secrets) | \`$TH_RESULT\` |"
            echo "| CodeQL ($lang_label) | \`$CQ_RESULT\` |"
            echo ""
            echo "Severity threshold: \`$THRESHOLD\`"
            echo ""
            echo "Detailed CodeQL findings are uploaded to the **Security** tab of this repository."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment when findings exist
        if: >-
          (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') &&
          inputs.enable-pr-comment &&
          (needs.trufflehog.result == 'failure' || needs.codeql.result == 'failure')
        env:
          TH_RESULT: ${{ needs.trufflehog.result }}
          CQ_RESULT: ${{ needs.codeql.result }}
          THRESHOLD: ${{ inputs.severity-threshold }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.gh_token || github.token }}
          script: |
            const marker = '<!-- security-baseline-summary -->';
            const th = process.env.TH_RESULT;
            const cq = process.env.CQ_RESULT;
            const threshold = process.env.THRESHOLD;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## Security baseline — findings detected',
              '',
              `- **TruffleHog**: \`${th}\``,
              `- **CodeQL**: \`${cq}\``,
              `- **Severity threshold**: \`${threshold}\``,
              '',
              `See the [job summary](${runUrl}) and the repository **Security** tab for details.`,
              '',
              '_This comment is updated automatically by the canonical security workflow._',
            ].join('\n');

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find(c =>
              c.user && c.user.login === 'github-actions[bot]' && c.body && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
