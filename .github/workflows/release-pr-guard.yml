name: Release PR Guard

on:
  workflow_call:
    inputs:
      package-slug:
        required: true
        type: string
      package-json-path:
        required: true
        type: string
      changelog-path:
        required: true
        type: string
    secrets:
      github-token:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Release PR validation
        uses: ./.github/actions/release-pr-guard
        with:
          github-token: ${{ secrets.github-token }}
          base-ref: ${{ github.base_ref }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          package-slug: ${{ inputs.package-slug }}
          package-json-path: ${{ inputs.package-json-path }}
          changelog-path: ${{ inputs.changelog-path }}
