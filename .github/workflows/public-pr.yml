name: Validate PR for Quality Standards before merging
# Shared by multiple projects
# Used in branch protection rulesets

on:
  workflow_call:
    inputs:
      tests-status:
        required: true
        type: boolean
        description: 'Status of tests and PR checks'

jobs:
  validate-pr: # to do checks after other workflows have run
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
        - name: Log Trigger Event and Contexts
          env:
            SECRETS_CONTEXT: ${{ toJSON(secrets) }}
            GITHUB_CONTEXT: ${{ toJSON(github) }}
            INPUTS_CONTEXT: ${{ toJSON(inputs) }}
          run: |
            echo "Inputs Context: $INPUTS_CONTEXT"
            echo "Secrets Context: $SECRETS_CONTEXT"
            echo "Full GitHub Context: $GITHUB_CONTEXT"

        - name: Check tests status
          run: |
            if [[ "${{ inputs.tests-status }}" != "true" ]]; then
              echo "::error title=Tests failed::Some tests or checks have failed"
              exit 1
            fi

        - name: Check if verify label is present
          run: |
            echo "Labels: ${{ join(github.event.pull_request.labels.*.name, ' ') }}"
            if [[ ! " ${{ join(github.event.pull_request.labels.*.name, ' ') }} " =~ " verify " ]]; then
              echo "::error title=PR is not verified::This PR needs the 'verify' label to be merged"
              exit 1
            fi
