name: General Library CI/CD Workflow
# Shared by multiple projects

on:
  workflow_call:
    inputs:
      debug_mode:
        required: false
        type: boolean
        default: false # DEBUG MODE ENABLED
    secrets:
      pat_token:
        required: false
    outputs:
      published_version:
        description: "The version that was published to npm"
        value: ${{ jobs.pull-request-event.outputs.published_version }}

jobs:
  pull-request-event:
    runs-on: ubuntu-latest
    if:  github.event_name == 'pull_request' || github.event_name == 'pull_request_target' || inputs.debug_mode
    permissions:
      contents: write
      packages: write
    outputs:
      published_version: ${{ steps.publish-pr.outputs.npm_published_version }}
    steps:
      - name: Echo Step
        run: |
          echo "Processing ${{ github.event_name }} event"
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "repository: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "ref: ${{ github.event.pull_request.head.ref }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for accurate ancestry checks
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Fetch PR head and target branch
        continue-on-error: true
        run: |
          echo "📥 Fetching repository history..."
          # Fetch target branch (e.g., main)
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}
          # Fetch PR head from fork or internal branch
          git fetch origin ${{ github.event.pull_request.head.sha }}:refs/pr/head

      - name: Check PR Status with Target Branch
        run: |
          echo "🔍 Checking PR status with target branch..."
          TARGET_SHA=${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA=${{ github.event.pull_request.head.sha }}
          echo "📌 Target SHA: $TARGET_SHA"
          echo "📌 PR Head SHA: $PR_HEAD_SHA"
          
          if ! git merge-base --is-ancestor "$TARGET_SHA" "$PR_HEAD_SHA"; then
            echo "::error title=PR is not up to date::This PR is not up to date with target branch"
            echo "ℹ️  Suggestion: Consider rebasing or merging the latest changes"
            echo "📊 Status: PR is STALE"
            exit 1
          else
            echo "✅ PR is up to date with target branch"
            echo "📊 Status: PR is CURRENT"
          fi
          
          echo "🔍 Additional PR Information:"
          echo "   - Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "   - Head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "   - PR State: ${{ github.event.pull_request.state }}"
          echo "   - PR Created At: ${{ github.event.pull_request.created_at }}"
          echo "   - PR Updated At: ${{ github.event.pull_request.updated_at }}"

      - name: Check for disallowed dependencies
        run: |
          deps=$(jq -r '.dependencies, .devDependencies // {} | to_entries[] | .value' package.json)
          if echo "$deps" | grep -Eq '^(git\+https:\/\/github.com|[0-9]+\.[0-9]+\.[0-9]+-(dev|tmp)[^"]*)$'; then
            echo "::error title=Disallowed dependency detected::Do not use git URLs or dev/tmp versions in dependencies"
            exit 1
          fi

      - name: Check for @tetherto/ prefix in package name
        run: |
          if ! grep -q '"name": "@tetherto/' package.json; then
            echo "::error title=Invalid package name::Package name in package.json must start with @tetherto/"
            exit 1
          fi

      - name: Run tests
        uses: tetherto/qvac-devops/.github/actions/run-lint-and-unit-tests@production-workflows-tag
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}

      - name: Call Publish GPR Action
        id: publish-pr
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@production-workflows-tag
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          tag: 'dev'

      - name: Echo published version from PR
        run: |
          echo "Published version from PR: ${{ steps.publish-pr.outputs.npm_published_version }}"

  push-event:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.debug_mode
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish to GPR
        id: publish-push
        uses: tetherto/qvac-devops/.github/actions/publish-library-to-gpr@production-workflows-tag
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Echo published version from push
        run: |
          echo "Published version from push: ${{ steps.publish-push.outputs.npm_published_version }}"

  debug-print:
    uses: ./.github/workflows/debugger-reusable.yml
    secrets:
      pat_token: ${{ secrets.PAT_TOKEN }}

  notify-reviewers:
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    uses: ./.github/workflows/automatically-add-reviewers.yaml
    with:
      reviewers: 'yuranich,chetasr,vigan-abd,ignaciolarranaga'
    secrets: inherit
