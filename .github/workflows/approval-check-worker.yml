# .github/workflows/approval-check-worker.yml
name: Tier-based Approval Check

on:
  repository_dispatch:
    types: [unified-approval-check]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  issues: write

jobs:
  check-approvals:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check PR approval requirements
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('triggered')
            const prNumber = ${{ github.event.client_payload.pr_number }};
            const prSha = '${{ github.event.client_payload.pr_sha }}';
            const triggerEvent = '${{ github.event.client_payload.trigger_event }}';
            
            console.log(`Checking approvals for PR #${prNumber} (triggered by: ${triggerEvent})`);

            // const repoOwningTeam = teamUtils.getRepoOwningTeam(github, context);
          
            const { checkApprovals, checkTierRequirements } = await import(`${process.cwd()}/.github/scripts/approval-checker.js`);
            
            // Get approval data
            const approvals = await checkApprovals(github, context, prNumber);

            // Get PR labels
            const labels = approvals.pr.labels.map(label => label.name);
            
            // Determine tier - default to tier1 if no label
            let tier = 'tier1';
            if (labels.includes('tier2')) {
              tier = 'tier2';
            }
            
            console.log(`PR #${prNumber} is classified as: ${tier}`);
            console.log(`PR Labels: ${labels.join(', ')}`);
            
            // Check requirements
            const result = checkTierRequirements(github, context, approvals, tier, prNumber);
            
            console.log(`Repository: ${approvals.repoOwningTeam}`);
            console.log(result.statusMessage);

            // Create status check on the correct commit
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: prSha,
              state: result.requirementsMet ? 'success' : 'failure',
              description: result.statusMessage,
              context: 'Tier-based Approval Check'
            });
            
            if (!result.requirementsMet) {
              core.setFailed(result.statusMessage);
            }