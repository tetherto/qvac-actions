name: Approval Check Worker (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
        description: 'PR number from dispatch payload'
      pr_sha:
        required: true
        type: string
        description: 'PR SHA from dispatch payload'
      trigger_event:
        required: false
        type: string
        default: 'repository_dispatch'
        description: 'Original trigger event'
    secrets:
      pat_token: 
        required: false


jobs:
  check-approvals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      issues: write
    steps:

      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          path: 'calling-repo'

      - name: Check PR approval requirements
        uses: actions/github-script@v7
        env:
          PAT_TOKEN: ${{ secrets.pat_token }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('triggered')
            const prNumber = ${{ inputs.pr_number }};
            const prSha = '${{ inputs.pr_sha }}';