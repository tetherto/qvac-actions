  workflow_dispatch:
    inputs:
      custom_input_1:
        required: false
        type: string
      custom_input_2:
        required: false
        type: string
      custom_input_3:
        required: false
        type: string

jobs:
  call-devops-lib:
    uses: tetherto/qvac-devops/.github/workflows/public-reusable.yml@v1.1.1
    secrets: inherit
