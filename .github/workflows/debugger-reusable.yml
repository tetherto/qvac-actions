name: Reusable Workflow

on:
  workflow_call:
    inputs:
      custom_input:
        description: 'Custom input from caller'
        required: false
        type: string
    secrets:
      pat_token:
        required: false

jobs:
  inspect-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log Workflow and Job Names
        run: |
          echo "Workflow Name: ${{ github.workflow }}"
          echo "Job Name: ${{ github.job }}"
          echo "Run Name (from event): ${{ github.event.head_commit.message || github.event.pull_request.title || 'Manual Run' }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Run ID: ${{ github.run_id }}"

      - name: Log Trigger Event and Contexts
        env:
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
          GITHUB_CONTEXT: ${{ toJSON(github) }}
          INPUTS_CONTEXT: ${{ toJSON(inputs) }}
        run: |
          echo "Triggering Event: ${{ github.event_name }}"
          echo "Secrets Context: $SECRETS_CONTEXT"
          echo "Full GitHub Context: $GITHUB_CONTEXT"
          echo "Inputs Context: $INPUTS_CONTEXT"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"

      - name: Conditional Step - Push Event
        if: github.event_name == 'push'
        run: |
          echo "This step runs only for push events."
          echo "Commit Message: ${{ github.event.head_commit.message }}"

      - name: Conditional Step - Pull Request Event
        if: github.event_name == 'pull_request'
        run: |
          echo "This step runs only for pull_request events."
          echo "PR Action: ${{ github.event.action }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "PR Title: ${{ github.event.pull_request.title }}"

      - name: Conditional Step - Workflow Dispatch Event
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "This step runs only for workflow_dispatch events."
          echo "Manual Input: ${{ inputs.custom_input }}"

      - name: Test Secrets
        run: |
          if [ -n "${{ secrets.pat_token }}" ]; then
            echo "Secret is available but not printed for security."
          else
            echo "No secret provided."
          fi

  notify-reviewers:
    uses: ./.github/workflows/automatically-add-reviewers.yaml
    with:
      reviewers: 'u011,natachikhinashvili,ignaciolarranaga'
    secrets: inherit
