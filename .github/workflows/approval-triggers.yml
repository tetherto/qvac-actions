name: Approval Triggers

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: write


jobs:
  dispatch-approval-check:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to unified workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue?.number || 
                           context.payload.pull_request?.number ||
                           context.payload.review?.pull_request?.number;
            
            const prSha = context.payload.pull_request?.head?.sha ||
                         context.payload.review?.pull_request?.head?.sha;
            
            console.log(`Dispatching approval check for PR #${prNumber}`);

            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'unified-approval-check',
              client_payload: {
                pr_number: prNumber,
                pr_sha: prSha,
                trigger_event: context.eventName,
                timestamp: Date.now()
              }
            });