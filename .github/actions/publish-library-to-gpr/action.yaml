name: Publish GPR
description: "Publish a package to GPR"

inputs:
  secret-token:
    description: "Secret token"
    required: true
  pat-token:
    description: "PAT token"
    required: false
  release:
    description: "Use tag. Release stream, temporary here for compatibility with old workflows"
    required: false
  tag:
    description: "Release Stream (npm tag)"
    required: false
  path:
    description: "Path to artifact to publish"
    required: false

outputs:
  npm_published_version:
    description: "The version that was published to npm"
    value: ${{ steps.publish.outputs.npm_published_version }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "18.x"
        registry-url: "https://npm.pkg.github.com/"
        scope: "@tetherto"

    - name: Publish to GPR
      id: publish
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.secret-token }}
        INPUTS_CONTEXT: ${{ toJSON(inputs) }}
      run: |
        if [ -n "${{ inputs.path }}"  ]; then
          echo "Changing directory to ${{ inputs.path }}"
          cd "${{ inputs.path }}"
        fi

        ### Get tag for NPM, support release for compatibility with old workflows
        echo "Input context: $INPUTS_CONTEXT"

        TAG="${{ inputs.tag }}"
        RELEASE="${{ inputs.release }}"

        if [ -z "$RELEASE" ]; then
          RELEASE="tmp"
        fi
        if [ -z "$TAG" ]; then
          TAG=$RELEASE
        fi

        ### Set tag to latest if PR was merged to main
        echo "Base branch: ${{ github.ref }}"
        echo "Event name: ${{ github.event_name }}"

        if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "PR was merged to main, setting tag to latest"
          TAG="latest"
        fi

        ### Set version, if not latest, we do detailed dev version
        SHORT_SHA=$(git rev-parse --short HEAD)
        PACKAGE_VERSION=$(node -p "require('./package.json').version")

        if [ "$TAG" = "dev" ] || [ "$TAG" = "tmp" ]; then
          VERSION="${PACKAGE_VERSION}-tmp.${GITHUB_RUN_ID}"
        else
          VERSION="${PACKAGE_VERSION}"
        fi

        if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
          echo "Updating version to $VERSION"
          npm version $VERSION --no-git-tag-version --allow-same-version
        fi

        echo "Publishing with tag: $TAG"
        echo "Publishing version: $VERSION"

        npm publish --tag $TAG
        PUBLISH_STATUS=$?

        # Debug output for parameters
        echo "Debug parameters:"
        echo "PUBLISH_STATUS: $PUBLISH_STATUS"
        echo "TAG: $TAG"
        echo "VERSION: $VERSION"
        echo "GITHUB_TOKEN permissions: ${{ github.token }}"

        # Output the published version
        echo "npm_published_version=$VERSION" >> $GITHUB_OUTPUT

        # Check if npm publish was successful and tag is latest
        if [ $PUBLISH_STATUS -eq 0 ] && [ "$TAG" = "latest" ]; then
          echo "âś… npm publish successful"
          (git tag "v$VERSION" && git push origin "v$VERSION" && echo "âś… Tagged and pushed v$VERSION") || echo "âš ď¸Ź Tag operation skipped or failed"
        else
          [ $PUBLISH_STATUS -eq 0 ] && echo "âś… npm publish successful" || echo "âťŚ npm publish failed"
        fi

        exit $PUBLISH_STATUS

    - name: Echo published version
      shell: bash
      run: |
        echo "Published version: ${{ steps.publish.outputs.npm_published_version }}"
