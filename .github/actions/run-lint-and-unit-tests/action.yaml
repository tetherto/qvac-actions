name: Run lint & unit tests
description: "Run linting and unit tests"

inputs:
  npm-token:
    description: "Auth token for registry.npmjs.org (for @qvac/*)"
    required: true
  gpr-token:
    description: "Auth token for GitHub Packages (for @tetherto/*) — can be the GitHub Actions GITHUB_TOKEN"
    required: true
  pat-token:
    description: "Optional PAT for fetching GitHub deps via HTTPS (git dependencies)"
    required: false
  registry-type:
    description: "Type of registry to use"
    required: true
    default: "gpr"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18.x"
    - name: Setup npm authentication for GPR
      run: |
        echo "@tetherto:registry=https://npm.pkg.github.com" > .npmrc
        echo "//npm.pkg.github.com/:_authToken=${{ inputs.pat-token }}" >> .npmrc
        git config --global url."https://${{ inputs.pat-token }}:@github.com/".insteadOf "https://github.com/"
      shell: bash
    - name: Install dependencies
      shell: bash
      run: npm install
    - name: Run linting
      shell: bash
      run: npm run lint
    - name: Install bare
      shell: bash
      run: npm install -g bare
    - name: Run tests
      shell: bash
      run: npm run test:unit --if-present
